<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Storage Vault</title>
  <style>
    :root{
      --bg:#fff7fb;--card:rgba(255,255,255,.93);--text:#2d1630;--muted:#7e607f;
      --accent:#ff6fb1;--accent2:#b66bff;--border:rgba(182,107,255,.2);
      --shadow:0 8px 32px rgba(0,0,0,.08);--r:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,Arial,sans-serif;background:linear-gradient(160deg,#fff7fb,#fdfcff);color:var(--text);min-height:100vh}
    .hidden{display:none!important}

    /* ── Inputs / buttons ── */
    input,select,textarea{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);font:inherit;font-size:14px;background:#fff;color:var(--text);outline:none}
    input:focus,select:focus{border-color:var(--accent)}
    button{cursor:pointer;padding:11px 20px;border-radius:10px;border:1px solid var(--border);font:inherit;font-size:13px;font-weight:600;background:#fff;color:var(--text);transition:.15s}
    button:hover{border-color:var(--accent2)}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none}
    .btn-primary:hover{opacity:.9}
    .btn-danger{background:#ffe7f0;color:#b4235d;border-color:#ffc0d5}
    .btn-ghost{background:rgba(182,107,255,.07);border-color:transparent}

    /* ── Login screen ── */
    #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px 36px;width:100%;max-width:400px;box-shadow:var(--shadow)}
    .vault-logo{font-size:32px;font-weight:900;letter-spacing:-.04em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
    .login-sub{color:var(--muted);font-size:14px;margin-bottom:28px}
    .login-card input{margin-bottom:12px}
    .login-card button{width:100%;margin-top:4px}
    #loginErr{margin-top:14px;color:#b4235d;font-size:13px;min-height:18px}

    /* ── App shell ── */
    #appScreen{display:flex;flex-direction:column;min-height:100vh}
    header{background:var(--card);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50}
    .app-logo{font-size:18px;font-weight:900;letter-spacing:-.03em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
    #headerEmail{flex:1;font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    header button{padding:8px 16px;font-size:13px;width:auto}

    /* ── Vault layout ── */
    .vault-layout{display:grid;grid-template-columns:240px 1fr;flex:1}
    @media(max-width:768px){.vault-layout{grid-template-columns:1fr}}

    /* ── Sidebar ── */
    aside{background:var(--card);border-right:1px solid var(--border);padding:18px;display:flex;flex-direction:column;gap:22px;min-height:0}
    .section-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
    .slot-item{padding:9px 12px;border-radius:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;border:1px solid transparent;transition:.15s;user-select:none}
    .slot-item:hover{background:rgba(182,107,255,.07)}
    .slot-item.active{background:linear-gradient(135deg,rgba(255,111,177,.1),rgba(182,107,255,.1));border-color:var(--border);font-weight:700}
    .slot-pill{font-size:11px;color:var(--muted);background:rgba(182,107,255,.12);padding:2px 8px;border-radius:999px;font-weight:600;min-width:28px;text-align:center}
    .slot-item.active .slot-pill{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}

    .upload-zone{border:1.5px dashed var(--border);border-radius:12px;padding:14px;text-align:center;cursor:pointer;transition:.15s;font-size:13px;color:var(--muted);background:rgba(255,255,255,.6)}
    .upload-zone:hover{border-color:var(--accent);background:rgba(255,111,177,.04)}
    .upload-zone input{display:none}

    /* ── Main content ── */
    main{padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
    .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .toolbar input{flex:1;min-width:180px;margin:0}
    .toolbar button{white-space:nowrap;padding:10px 16px}
    .sel-info{font-size:13px;color:var(--muted);white-space:nowrap;padding:0 4px}

    /* ── File grid ── */
    .file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:13px}
    .file-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.18s;position:relative}
    .file-card:hover{box-shadow:0 6px 24px rgba(182,107,255,.18);border-color:rgba(182,107,255,.45)}
    .file-card.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(255,111,177,.22)}
    .file-thumb{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;overflow:hidden}
    .file-thumb.t-image{background:linear-gradient(135deg,#fff0f8,#f5e8ff)}
    .file-thumb.t-video{background:linear-gradient(135deg,#f0f0ff,#e8f5ff)}
    .file-thumb.t-audio{background:linear-gradient(135deg,#fff8e8,#fff0f5)}
    .file-thumb.t-file {background:#f8f8fb}
    .file-thumb img,.file-thumb video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .file-info{padding:10px 12px}
    .file-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
    .file-meta{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;gap:6px}
    .slot-tag{font-size:10px;padding:1px 6px;border-radius:999px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));flex-shrink:0}
    .check-box{position:absolute;top:7px;left:7px;width:20px;height:20px;border-radius:6px;border:1.5px solid rgba(255,255,255,.85);background:rgba(255,255,255,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;z-index:5;transition:.15s}
    .file-card.selected .check-box{background:var(--accent);border-color:var(--accent)}

    /* ── Empty / loading states ── */
    .state-box{padding:56px 20px;text-align:center;color:var(--muted);border:1px dashed var(--border);border-radius:var(--r)}
    .state-box .icon{font-size:48px;margin-bottom:14px}
    .state-box p{font-size:14px;line-height:1.6}

    /* ── Status bar ── */
    .statusbar{background:var(--card);border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;font-size:13px;position:sticky;bottom:0;z-index:50}
    .dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
    .dot.ok{background:#47c47c}.dot.warn{background:#f0ad4e}.dot.bad{background:#ef5c7d}
    #statusSub{flex:1;color:var(--muted)}
    #fileCount{color:var(--muted)}

    /* ── Preview modal ── */
    .modal-bg{position:fixed;inset:0;background:rgba(10,5,18,.75);display:flex;align-items:center;justify-content:center;padding:16px;z-index:200;backdrop-filter:blur(6px)}
    .modal{background:#fff;border-radius:22px;width:min(860px,100%);max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 40px 100px rgba(0,0,0,.35)}
    .modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px}
    .modal-title{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .modal-meta{font-size:12px;color:var(--muted);margin-top:2px}
    .modal-head button{padding:8px 14px;font-size:12px;width:auto;flex-shrink:0}
    .modal-body{flex:1;overflow:auto;background:#12101a;display:flex;align-items:center;justify-content:center;min-height:280px}
    .modal-body img{max-width:100%;max-height:68vh;border-radius:10px;display:block}
    .modal-body video,.modal-body audio{max-width:100%;max-height:68vh;border-radius:10px}
    .modal-body audio{width:100%;max-height:none;padding:20px}
    .modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .modal-foot button{width:auto;padding:9px 18px;font-size:13px}
    .modal-slot{font-size:12px;color:var(--muted)}

    /* ── Upload progress toast ── */
    .toast{position:fixed;bottom:56px;right:18px;background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px 18px;box-shadow:var(--shadow);z-index:300;min-width:240px;font-size:13px}
    .toast strong{display:block;margin-bottom:4px}
    .toast-sub{color:var(--muted);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bar{height:4px;background:#f0e8ff;border-radius:999px;overflow:hidden}
    .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;transition:width .3s ease}
  </style>
</head>
<body>

<!-- ═══════════════════════════════ LOGIN ═══════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="vault-logo">Storage Vault</div>
    <div class="login-sub">Authorized accounts only</div>
    <input id="loginEmail" type="email" placeholder="Email address" autocomplete="email"/>
    <input id="loginPass"  type="password" placeholder="Password" autocomplete="current-password"/>
    <button id="btnLogin" class="btn-primary">Sign in</button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- ═════════════════════════════════ APP ═══════════════════════════════════ -->
<div id="appScreen" class="hidden">

  <header>
    <div class="app-logo">Storage Vault</div>
    <div id="headerEmail"></div>
    <button id="btnRefresh" class="btn-ghost">↻ Refresh</button>
    <button id="btnSignOut">Sign out</button>
  </header>

  <div class="vault-layout">

    <!-- ── Sidebar ── -->
    <aside>
      <div>
        <div class="section-label">Storage Slots</div>
        <div id="slotFilters"></div>
      </div>
      <div>
        <div class="section-label">Upload to slot</div>
        <select id="uploadSlot" style="margin-bottom:10px"></select>
        <label class="upload-zone">
          <input id="uploadInput" type="file" multiple accept="image/*,video/*,audio/*"/>
          📎 Choose files to upload
        </label>
      </div>
    </aside>

    <!-- ── Main ── -->
    <main>
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="🔍  Search files by name…"/>
        <button id="btnSelectAll" class="btn-ghost">Select all</button>
        <span id="selInfo" class="sel-info hidden"></span>
        <button id="btnDeleteSelected" class="btn-danger hidden">🗑 Delete selected</button>
      </div>

      <div id="fileGrid" class="file-grid"></div>
      <div id="emptyState"  class="state-box hidden"><div class="icon">🗂️</div><p>No files found.</p></div>
      <div id="loadingState" class="state-box">
        <div class="icon">⏳</div>
        <p id="loadingMsg">Connecting to storage…</p>
      </div>
    </main>
  </div>

  <div class="statusbar">
    <div class="dot warn" id="statusDot"></div>
    <span id="statusText">Not connected</span>
    <span id="statusSub"></span>
    <span id="fileCount"></span>
  </div>
</div>

<!-- ════════════════════════════ PREVIEW MODAL ═════════════════════════════ -->
<div id="previewModal" class="modal-bg hidden">
  <div class="modal">
    <div class="modal-head">
      <div style="min-width:0">
        <div class="modal-title" id="pName"></div>
        <div class="modal-meta"  id="pMeta"></div>
      </div>
      <button id="btnClosePreview">✕ Close</button>
    </div>
    <div class="modal-body" id="pBody">
      <span style="color:rgba(255,255,255,.4);font-size:20px">Loading…</span>
    </div>
    <div class="modal-foot">
      <span class="modal-slot" id="pSlot"></span>
      <div style="display:flex;gap:10px">
        <button id="btnDownload" class="btn-ghost">⬇ Download</button>
        <button id="btnDeletePreview" class="btn-danger">🗑 Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════ UPLOAD TOAST ══════════════════════════════ -->
<div id="uploadToast" class="toast hidden">
  <strong>Uploading…</strong>
  <div class="toast-sub" id="toastSub">Preparing…</div>
  <div class="bar"><div class="bar-fill" id="toastBar" style="width:0%"></div></div>
</div>

<!-- ═════════════════════════════ SCRIPT ═══════════════════════════════════ -->
<script type="module">
import { Storage } from 'https://unpkg.com/megajs/dist/main.browser-es.mjs';

const BACKEND = 'https://script.google.com/macros/s/AKfycbzict1PB8A-nDDI0Rq44heHJcLoHwYLTUO7ckNcoeeHMdA5tm1dxmTgsUkW4CttOCWugQ/exec';

// ─── State ────────────────────────────────────────────────────────────────────
const S = {
  email:        null,
  accounts:     [],   // [{slot, megaEmail, megaPassword}]
  storages:     [],   // [{slot, storage, megaEmail}]
  allFiles:     [],   // flat list of every file across all slots
  currentSlot:  'all',
  query:        '',
  selected:     new Set(),
  preview:      null, // current file being previewed
  previewBlob:  null  // blob URL for preview
};

// ─── Helpers ──────────────────────────────────────────────────────────────────
const $    = id => document.getElementById(id);
const esc  = s  => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const norm = s  => String(s ?? '').trim().toLowerCase();

function fmtSize(b) {
  if (!b) return '0 B';
  const u = ['B','KB','MB','GB','TB']; let i = 0, n = b;
  while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
  return n.toFixed(i === 0 ? 0 : 1) + ' ' + u[i];
}
function fmtDate(ts) { return new Date(ts).toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' }); }

function guessMime(name = '') {
  const ext = name.split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif','webp','avif','bmp','heic','svg'].includes(ext)) return 'image/' + ext;
  if (['mp4','mov','webm','mkv','avi','m4v'].includes(ext)) return 'video/' + ext;
  if (['mp3','ogg','wav','flac','aac','m4a','opus'].includes(ext)) return 'audio/' + ext;
  return 'application/octet-stream';
}
function typeOf(file) {
  const m = file.mime || '';
  if (m.startsWith('image/')) return 'image';
  if (m.startsWith('video/')) return 'video';
  if (m.startsWith('audio/')) return 'audio';
  return 'file';
}
const typeEmoji = { image:'🖼️', video:'🎬', audio:'🎵', file:'📄' };

function setStatus(kind, text, sub = '') {
  $('statusDot').className  = 'dot ' + kind;
  $('statusText').textContent = text;
  $('statusSub').textContent  = sub;
}

// ─── Backend ──────────────────────────────────────────────────────────────────
async function api(action, params = {}) {
  const url = new URL(BACKEND);
  url.searchParams.set('action', action);
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  const res  = await fetch(url.toString(), { redirect: 'follow' });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); }
  catch { throw new Error('Server returned non-JSON. Check your Apps Script deployment.'); }
  if (data.ok === false) throw new Error(data.error || 'Server error');
  return data;
}

// ─── Login ────────────────────────────────────────────────────────────────────
async function login() {
  const email = norm($('loginEmail').value);
  const pass  = $('loginPass').value.trim();
  $('loginErr').textContent = '';
  if (!email || !pass) { $('loginErr').textContent = 'Enter email and password.'; return; }

  $('btnLogin').textContent = 'Signing in…';
  $('btnLogin').disabled = true;
  try {
    const res = await api('login', { email, password: pass });
    S.email    = res.email;
    S.accounts = res.accounts;
    $('loginScreen').classList.add('hidden');
    $('appScreen').classList.remove('hidden');
    $('headerEmail').textContent = S.email;
    await connectAndLoad();
  } catch(err) {
    $('loginErr').textContent = err.message;
    $('btnLogin').textContent = 'Sign in';
    $('btnLogin').disabled = false;
  }
}

function signOut() {
  Object.assign(S, { email:null, accounts:[], storages:[], allFiles:[], currentSlot:'all', query:'', selected:new Set(), preview:null });
  if (S.previewBlob) { URL.revokeObjectURL(S.previewBlob); S.previewBlob = null; }
  $('appScreen').classList.add('hidden');
  $('loginScreen').classList.remove('hidden');
  $('loginEmail').value = '';
  $('loginPass').value  = '';
  $('btnLogin').textContent = 'Sign in';
  $('btnLogin').disabled = false;
  $('loginErr').textContent = '';
}

// ─── MEGA connection & file tree ─────────────────────────────────────────────
async function connectAndLoad() {
  setStatus('warn', 'Connecting…', 'Logging into MEGA accounts');
  $('loadingState').classList.remove('hidden');
  $('fileGrid').innerHTML = '';
  $('emptyState').classList.add('hidden');
  S.storages = [];
  S.allFiles = [];

  // Connect to each MEGA slot concurrently; don't fail if one slot is down
  const results = await Promise.allSettled(
    S.accounts.map(async acc => {
      const storage = await new Storage({
        email:     acc.megaEmail,
        password:  acc.megaPassword,
        userAgent: 'StorageVault/1.0'
      }).ready;
      return { slot: acc.slot, storage, megaEmail: acc.megaEmail };
    })
  );

  const failed = [];
  for (const r of results) {
    if (r.status === 'fulfilled') S.storages.push(r.value);
    else failed.push(r.reason?.message || String(r.reason));
  }

  if (!S.storages.length) {
    setStatus('bad', 'No slots connected', failed.join(' | '));
    $('loadingMsg').textContent = 'Failed to connect: ' + failed.join('; ');
    return;
  }

  // Walk file tree from each connected storage
  setStatus('warn', 'Loading files…', `Connected to ${S.storages.length} of ${S.accounts.length} slot(s)`);
  for (const entry of S.storages) {
    $('loadingMsg').textContent = `Scanning slot ${entry.slot}…`;
    walkNode(entry.storage.root, entry.slot, '');
  }

  $('loadingState').classList.add('hidden');
  buildSidebar();
  applyFilter();

  const warn = failed.length ? ` (${failed.length} slot(s) failed)` : '';
  setStatus(failed.length ? 'warn' : 'ok',
    `${S.allFiles.length} files loaded`,
    `${S.storages.length} storage slot(s) active${warn}`);
}

function walkNode(node, slot, path) {
  for (const child of (node.children || [])) {
    if (child.directory) {
      walkNode(child, slot, path ? `${path}/${child.name}` : child.name);
    } else {
      const mime = guessMime(child.name);
      S.allFiles.push({
        id:        child.nodeId || child.handle || `${slot}-${Date.now()}-${Math.random()}`,
        name:      child.name  || 'unnamed',
        size:      child.size  || 0,
        mime,
        slot,
        path,
        createdAt: child.timestamp ? child.timestamp * 1000 : Date.now(),
        megaNode:  child
      });
    }
  }
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function buildSidebar() {
  const counts = {};
  for (const f of S.allFiles) counts[f.slot] = (counts[f.slot] || 0) + 1;

  let html = `<div class="slot-item ${S.currentSlot === 'all' ? 'active' : ''}" data-slot="all">
    <span>All files</span><span class="slot-pill">${S.allFiles.length}</span>
  </div>`;
  for (const { slot } of S.storages) {
    html += `<div class="slot-item ${S.currentSlot == slot ? 'active' : ''}" data-slot="${slot}">
      <span>Slot ${slot}</span><span class="slot-pill">${counts[slot] || 0}</span>
    </div>`;
  }
  $('slotFilters').innerHTML = html;
  $('slotFilters').querySelectorAll('.slot-item').forEach(el => {
    el.addEventListener('click', () => {
      S.currentSlot = el.dataset.slot;
      buildSidebar();
      applyFilter();
    });
  });

  // Upload slot selector
  $('uploadSlot').innerHTML = S.storages
    .map(s => `<option value="${s.slot}">Slot ${s.slot} — ${s.megaEmail}</option>`)
    .join('');
}

// ─── Filtering & rendering ────────────────────────────────────────────────────
function applyFilter() {
  S.query = norm($('searchInput').value);
  let files = S.allFiles;
  if (S.currentSlot !== 'all') files = files.filter(f => f.slot == S.currentSlot);
  if (S.query) files = files.filter(f => norm(f.name).includes(S.query));
  renderGrid(files);
}

function renderGrid(files) {
  const n = files.length;
  $('fileCount').textContent = n ? `${n} file${n !== 1 ? 's' : ''}` : '';

  if (!n) {
    $('fileGrid').innerHTML = '';
    $('emptyState').classList.remove('hidden');
    updateSelUI();
    return;
  }
  $('emptyState').classList.add('hidden');

  $('fileGrid').innerHTML = files.map(f => {
    const type = typeOf(f);
    const sel  = S.selected.has(f.id);
    return `<div class="file-card${sel ? ' selected' : ''}" data-id="${esc(f.id)}">
      <div class="file-thumb t-${type}">
        <span style="position:relative;z-index:1">${typeEmoji[type] || '📄'}</span>
      </div>
      <div class="check-box">${sel ? '✓' : ''}</div>
      <div class="file-info">
        <div class="file-name" title="${esc(f.name)}">${esc(f.name)}</div>
        <div class="file-meta">
          <span>${fmtSize(f.size)}</span>
          <span class="slot-tag">S${f.slot}</span>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">${fmtDate(f.createdAt)}</div>
      </div>
    </div>`;
  }).join('');

  // Delegated event listeners
  $('fileGrid').querySelectorAll('.file-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.check-box')) {
        toggleSelect(card.dataset.id);
      } else {
        const file = S.allFiles.find(f => f.id === card.dataset.id);
        if (file) openPreview(file);
      }
    });
  });

  updateSelUI();
}

function toggleSelect(id) {
  S.selected.has(id) ? S.selected.delete(id) : S.selected.add(id);
  const card = $('fileGrid').querySelector(`[data-id="${CSS.escape(id)}"]`);
  if (card) {
    card.classList.toggle('selected', S.selected.has(id));
    card.querySelector('.check-box').textContent = S.selected.has(id) ? '✓' : '';
  }
  updateSelUI();
}

function updateSelUI() {
  const n = S.selected.size;
  $('selInfo').classList.toggle('hidden', !n);
  $('btnDeleteSelected').classList.toggle('hidden', !n);
  if (n) $('selInfo').textContent = `${n} selected`;
}

// ─── Select all ───────────────────────────────────────────────────────────────
$('btnSelectAll').addEventListener('click', () => {
  let files = S.allFiles;
  if (S.currentSlot !== 'all') files = files.filter(f => f.slot == S.currentSlot);
  if (S.query) files = files.filter(f => norm(f.name).includes(S.query));
  files.forEach(f => S.selected.add(f.id));
  applyFilter();
});

// ─── Delete selected ──────────────────────────────────────────────────────────
$('btnDeleteSelected').addEventListener('click', async () => {
  const n = S.selected.size;
  if (!n) return;
  if (!confirm(`Permanently delete ${n} file${n !== 1 ? 's' : ''}? This cannot be undone.`)) return;

  setStatus('warn', `Deleting ${n} file${n !== 1 ? 's' : ''}…`, '');
  const ids = [...S.selected];
  let done = 0;
  for (const id of ids) {
    const file = S.allFiles.find(f => f.id === id);
    if (!file) continue;
    try { await file.megaNode.delete(true); done++; }
    catch(e) { console.warn('Delete failed:', file.name, e); }
    S.allFiles = S.allFiles.filter(f => f.id !== id);
  }
  S.selected.clear();
  buildSidebar();
  applyFilter();
  setStatus('ok', `Deleted ${done} file${done !== 1 ? 's' : ''}`, '');
});

// ─── Refresh ──────────────────────────────────────────────────────────────────
$('btnRefresh').addEventListener('click', async () => {
  S.allFiles = []; S.selected.clear(); S.currentSlot = 'all';
  await connectAndLoad();
});

// ─── Search ───────────────────────────────────────────────────────────────────
$('searchInput').addEventListener('input', applyFilter);

// ─── Preview ──────────────────────────────────────────────────────────────────
async function openPreview(file) {
  S.preview = file;
  $('pName').textContent = file.name;
  $('pMeta').textContent = `${fmtSize(file.size)}  •  ${fmtDate(file.createdAt)}`;
  $('pSlot').textContent  = `Slot ${file.slot}${file.path ? '  ›  ' + file.path : ''}`;
  $('pBody').innerHTML    = '<span style="color:rgba(255,255,255,.4);font-size:20px">⏳ Loading…</span>';
  $('previewModal').classList.remove('hidden');

  try {
    const buffer = await file.megaNode.downloadBuffer();
    const mime   = file.mime || guessMime(file.name);
    if (S.previewBlob) URL.revokeObjectURL(S.previewBlob);
    S.previewBlob = URL.createObjectURL(new Blob([buffer], { type: mime }));
    const type = typeOf(file);

    if (type === 'image') {
      $('pBody').innerHTML = `<img src="${S.previewBlob}" alt="${esc(file.name)}"/>`;
    } else if (type === 'video') {
      $('pBody').innerHTML = `<video src="${S.previewBlob}" controls autoplay playsinline></video>`;
    } else if (type === 'audio') {
      $('pBody').innerHTML = `<audio src="${S.previewBlob}" controls autoplay></audio>`;
    } else {
      $('pBody').innerHTML = `<div style="color:rgba(255,255,255,.7);text-align:center;padding:40px">
        <div style="font-size:64px">📄</div>
        <div style="margin-top:14px;font-size:15px">${esc(file.name)}</div>
        <div style="margin-top:6px;opacity:.55;font-size:13px">${fmtSize(file.size)}</div>
        <div style="margin-top:20px"><a href="${S.previewBlob}" download="${esc(file.name)}" style="color:#ff6fb1">⬇ Download</a></div>
      </div>`;
    }
  } catch(err) {
    $('pBody').innerHTML = `<div style="color:#ef5c7d;text-align:center;padding:40px">Failed to load: ${esc(err.message)}</div>`;
  }
}

function closePreview() {
  $('previewModal').classList.add('hidden');
  if (S.previewBlob) { URL.revokeObjectURL(S.previewBlob); S.previewBlob = null; }
  $('pBody').innerHTML = '';
  S.preview = null;
}

$('btnClosePreview').addEventListener('click', closePreview);
$('previewModal').addEventListener('click', e => { if (e.target === $('previewModal')) closePreview(); });

$('btnDownload').addEventListener('click', async () => {
  if (!S.preview) return;
  let blobUrl = S.previewBlob;
  if (!blobUrl) {
    try {
      const buf = await S.preview.megaNode.downloadBuffer();
      const mime = S.preview.mime || guessMime(S.preview.name);
      blobUrl = URL.createObjectURL(new Blob([buf], { type: mime }));
    } catch(e) { return alert('Download failed: ' + e.message); }
  }
  const a = Object.assign(document.createElement('a'), { href: blobUrl, download: S.preview.name || 'download' });
  document.body.appendChild(a); a.click(); a.remove();
});

$('btnDeletePreview').addEventListener('click', async () => {
  if (!S.preview) return;
  if (!confirm(`Permanently delete "${S.preview.name}"?`)) return;
  try {
    await S.preview.megaNode.delete(true);
    const id = S.preview.id;
    S.allFiles = S.allFiles.filter(f => f.id !== id);
    S.selected.delete(id);
    closePreview();
    buildSidebar();
    applyFilter();
    setStatus('ok', 'File deleted', '');
  } catch(e) { alert('Delete failed: ' + e.message); }
});

// ─── Upload ───────────────────────────────────────────────────────────────────
$('uploadInput').addEventListener('change', async function() {
  const files = [...this.files];
  if (!files.length) return;

  const slotNum = Number($('uploadSlot').value);
  const entry   = S.storages.find(s => s.slot === slotNum);
  if (!entry) { alert('Selected slot not available.'); this.value = ''; return; }

  const toast = $('uploadToast');
  toast.classList.remove('hidden');
  let uploaded = 0;

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    $('toastSub').textContent = `(${i + 1}/${files.length})  ${file.name}`;
    $('toastBar').style.width = Math.round((i / files.length) * 100) + '%';
    setStatus('warn', `Uploading ${i + 1}/${files.length}…`, file.name);

    try {
      const ab    = await file.arrayBuffer();
      const up    = entry.storage.root.upload({ name: file.name, size: file.size }, ab);
      const node  = await up.complete;
      uploaded++;
      const mime  = file.type || guessMime(file.name);
      S.allFiles.push({
        id:        node.nodeId || node.handle || `up-${Date.now()}-${Math.random()}`,
        name:      file.name,
        size:      file.size,
        mime,
        slot:      slotNum,
        path:      '',
        createdAt: Date.now(),
        megaNode:  node
      });
    } catch(err) {
      console.error('Upload failed:', file.name, err);
      alert(`Upload failed for "${file.name}":\n${err.message}`);
    }
  }

  $('toastBar').style.width = '100%';
  $('toastSub').textContent = `Done — ${uploaded} file${uploaded !== 1 ? 's' : ''} uploaded`;
  setTimeout(() => toast.classList.add('hidden'), 2500);

  this.value = '';
  buildSidebar();
  applyFilter();
  setStatus('ok', `Uploaded ${uploaded} file${uploaded !== 1 ? 's' : ''} to Slot ${slotNum}`, '');
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
$('btnLogin').addEventListener('click', login);
$('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
$('loginEmail').addEventListener('keydown', e => { if (e.key === 'Enter') $('loginPass').focus(); });
$('btnSignOut').addEventListener('click', signOut);
</script>
</body>
</html>
